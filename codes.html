<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WashTrac Code Manager</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f6f8;
padding:40px;
}

h1{
margin-bottom:20px;
}

.form{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

input{
padding:10px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:10px 16px;
background:#1d4ed8;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#f1f1f1;
}
</style></head><body><h1>WashTrac Code Manager</h1><div class="form">
<input id="newCode" placeholder="Code">
<input id="newDepartment" placeholder="Department">
<input id="newName" placeholder="Name">
<button onclick="addCode()">Add Code</button>
</div><table>
<thead>
<tr>
<th>Code</th>
<th>Department</th>
<th>Name</th>
<th>Uses</th>
<th>Last Used</th>
<th>Remove</th>
</tr>
</thead>
<tbody id="codesTableBody"></tbody>
</table><script>

const SUPABASE_URL = "https://feqrsypiugwwdweiwvua.supabase.co";
const SUPABASE_KEY = "sb_publishable_wWkZTvf6dLAlreLlLAOcXA_7jG3D8GS";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadCodes(){

const {data,error}=await supabaseClient
.from("codes")
.select("*")
.order("created_at",{ascending:false});

if(error){
console.log(error);
return;
}

const body=document.getElementById("codesTableBody");
body.innerHTML="";

data.forEach(row=>{

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${row.code}</td>
<td>${row.department||""}</td>
<td>${row.name||""}</td>
<td>${row.uses||0}</td>
<td>${row.last_used||"-"}</td>
<td><button onclick="deleteCode('${row.code}')">Remove</button></td>
`;

body.appendChild(tr);

});

}

async function addCode(){

const code=document.getElementById("newCode").value.trim();
const department=document.getElementById("newDepartment").value.trim();
const name=document.getElementById("newName").value.trim();

if(!code||!department||!name){
alert("Fill all fields");
return;
}

const {error}=await supabaseClient
.from("codes")
.insert([{code,department,name,uses:0,last_used:"-"}]);

if(error){
alert("Code exists or error");
console.log(error);
return;
}

document.getElementById("newCode").value="";
document.getElementById("newDepartment").value="";
document.getElementById("newName").value="";

loadCodes();

}

async function deleteCode(code){

await supabaseClient
.from("codes")
.delete()
.eq("code",code);

loadCodes();

}

loadCodes();

</script></body>
</html>
