<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WashTrac Codes</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

h1{
margin-bottom:20px;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px 16px;
cursor:pointer;
background:#0b5cff;
color:white;
border:none;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

</style>

</head>

<body>

<h1>WashTrac Code Manager</h1>

<div>

<input id="newCode" placeholder="Code">
<input id="newDepartment" placeholder="Department">
<input id="newName" placeholder="Name">

<button onclick="addCode()">Add Code</button>

</div>

<table>

<thead>
<tr>
<th>Code</th>
<th>Department</th>
<th>Name</th>
<th>Uses</th>
<th>Last Used</th>
<th>Remove</th>
</tr>
</thead>

<tbody id="codesTableBody">
</tbody>

</table>

<script>

const SUPABASE_URL = "https://feqrsypiugwwdweiwvua.supabase.co";
const SUPABASE_KEY = "sb_publishable_wWkZTvf6dLAlreLlLAOcXA_7jG3D8GS";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function fetchCodes(){

const { data, error } = await supabaseClient
.from("codes")
.select("*")
.order("created_at",{ascending:false});

if(error){
console.log(error);
return[];
}

return data;

}

async function renderCodes(){

const codes = await fetchCodes();
const body = document.getElementById("codesTableBody");

body.innerHTML="";

codes.forEach(item=>{

const tr=document.createElement("tr");

tr.innerHTML=`

<td>${item.code}</td>
<td>${item.department||""}</td>
<td>${item.name||""}</td>
<td>${item.uses||0}</td>
<td>${item.last_used||"-"}</td>
<td>
<button onclick="removeCode('${item.code}')">Remove</button>
</td>

`;

body.appendChild(tr);

});

}

async function addCode(){

const code=document.getElementById("newCode").value.trim();
const department=document.getElementById("newDepartment").value.trim();
const name=document.getElementById("newName").value.trim();

if(!code||!department||!name){

alert("Fill in all fields");
return;

}

const { error } = await supabaseClient
.from("codes")
.insert([{code,department,name,uses:0,last_used:"-"}]);

if(error){

alert("Code already exists or error occurred");
console.log(error);
return;

}

document.getElementById("newCode").value="";
document.getElementById("newDepartment").value="";
document.getElementById("newName").value="";

renderCodes();

}

async function removeCode(code){

const { error } = await supabaseClient
.from("codes")
.delete()
.eq("code",code);

if(error){

alert("Could not delete code");
console.log(error);

}

renderCodes();

}

renderCodes();

</script>

</body>
</html>
