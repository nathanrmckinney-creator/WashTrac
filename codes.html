<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>WashTrac Code Manager</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
body{
font-family: Arial;
background:#f4f4f4;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:6px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
margin-bottom:30px;
}

input{
padding:12px;
margin:5px;
width:200px;
}

button{
padding:12px 18px;
background:#2d6cdf;
border:none;
color:white;
cursor:pointer;
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

.removeBtn{
background:#d9534f;
}
</style></head><body><div class="container"><h1>WashTrac Code Manager</h1><div><input id="code" placeholder="Code">
<input id="department" placeholder="Department">
<input id="name" placeholder="Name"><button onclick="addCode()">Add Code</button>

</div><table id="codesTable"><thead>
<tr>
<th>Code</th>
<th>Department</th>
<th>Name</th>
<th>Uses</th>
<th>Last Used</th>
<th>Remove</th>
</tr>
</thead><tbody></tbody></table></div><script>

const SUPABASE_URL = "https://feqrsypiugwwdweiwvua.supabase.co"
const SUPABASE_KEY = "sb_publishable_wWkZTvf6dLAlreLlLAOcXA_7jG3D8GS"

const client = supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

async function loadCodes(){

const {data,error} = await client
.from("codes")
.select("*")
.order("id",{ascending:false})

const tbody=document.querySelector("#codesTable tbody")

tbody.innerHTML=""

data.forEach(row=>{

tbody.innerHTML+=`

<tr>

<td>${row.code}</td>
<td>${row.department}</td>
<td>${row.name}</td>
<td>${row.uses}</td>
<td>${row.last_used || ""}</td>

<td>
<button class="removeBtn"
onclick="deleteCode(${row.id})">
Remove
</button>
</td>

</tr>

`

})

}

async function addCode(){

const code=document.getElementById("code").value
const department=document.getElementById("department").value
const name=document.getElementById("name").value

await client.from("codes").insert([{
code,
department,
name
}])

document.getElementById("code").value=""
document.getElementById("department").value=""
document.getElementById("name").value=""

loadCodes()

}

async function deleteCode(id){

await client
.from("codes")
.delete()
.eq("id",id)

loadCodes()

}

loadCodes()

</script></body>
</html>
