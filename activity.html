<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>WashTrac Activity</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.sidebar{
position:fixed;
left:0;
top:0;
bottom:0;
width:220px;
background:#0f172a;
padding:20px;
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:40px;
}

.nav a{
display:block;
color:#cbd5f5;
text-decoration:none;
padding:10px 0;
}

.nav a:hover{
color:white;
}

.main{
margin-left:220px;
padding:30px;
}

.page-header{
margin-bottom:24px;
}

.filters{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:12px;
margin-bottom:20px;
}

.filters input{
padding:12px;
border-radius:6px;
border:1px solid #334155;
background:#111827;
color:white;
}

.card{
background:#111827;
padding:20px;
border-radius:8px;
}

.summary{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
margin-bottom:20px;
}

.summary-box{
background:#111827;
padding:18px;
border-radius:8px;
}

.summary-box strong{
display:block;
font-size:28px;
margin-bottom:6px;
}

.summary-box span{
color:#94a3b8;
font-size:14px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:12px 8px;
border-bottom:1px solid #1f2937;
text-align:left;
}

th{
color:#93c5fd;
font-size:13px;
text-transform:uppercase;
letter-spacing:.5px;
}

button{
padding:12px 16px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button.secondary{
background:#334155;
}

.actions{
display:flex;
gap:12px;
margin-top:16px;
flex-wrap:wrap;
}

@media (max-width:1000px){
.filters,
.summary{
grid-template-columns:1fr;
}
}
</style></head><body><div class="sidebar"><div class="logo">WashTrac</div><div class="nav">
<a href="dashboard.html">Dashboard</a>
<a href="codes.html">Codes</a>
<a href="activity.html">Activity</a>
<a href="#">Reports</a>
<a href="#">Locations</a>
<a href="#">Devices</a>
<a href="#">Account</a>
</div></div><div class="main"><div class="page-header">
<h1>Activity</h1>
<p style="color:#94a3b8;">Search wash events by code, department, name, bay, or time.</p>
</div><div class="summary">
<div class="summary-box">
<strong id="totalEvents">0</strong>
<span>Total Events</span>
</div><div class="summary-box">
<strong id="uniqueCodes">0</strong>
<span>Unique Codes</span>
</div><div class="summary-box">
<strong id="uniqueDepartments">0</strong>
<span>Departments</span>
</div><div class="summary-box">
<strong id="uniqueBays">0</strong>
<span>Bays</span>
</div>
</div><div class="card"><div class="filters">
<input id="filterCode" placeholder="Filter by code" oninput="renderActivity()">
<input id="filterDepartment" placeholder="Filter by department" oninput="renderActivity()">
<input id="filterName" placeholder="Filter by name" oninput="renderActivity()">
<input id="filterBay" placeholder="Filter by bay" oninput="renderActivity()">
<input id="filterEvent" placeholder="Filter by event" oninput="renderActivity()">
</div><div class="actions">
<button onclick="clearFilters()">Clear Filters</button>
<button class="secondary" onclick="window.print()">Print</button>
</div><table>
<thead>
<tr>
<th>Time</th>
<th>Code</th>
<th>Department</th>
<th>Name</th>
<th>Bay</th>
<th>Event</th>
</tr>
</thead>
<tbody id="activityTableBody"></tbody>
</table></div></div><script>

const SUPABASE_URL = "https://feqrsypiugwwdweiwvua.supabase.co"
const SUPABASE_KEY = "sb_publishable_wWkZTvf6dLAlreLlLAOcXA_7jG3D8GS"

const client = supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

async function fetchActivity(){

const {data,error} = await client
.from("activity")
.select("*")
.order("event_time",{ascending:false})

if(error){
console.log(error)
return []
}

return data || []

}

async function renderActivity(){

const codeFilter = document.getElementById("filterCode").value.trim().toLowerCase()
const departmentFilter = document.getElementById("filterDepartment").value.trim().toLowerCase()
const nameFilter = document.getElementById("filterName").value.trim().toLowerCase()
const bayFilter = document.getElementById("filterBay").value.trim().toLowerCase()
const eventFilter = document.getElementById("filterEvent").value.trim().toLowerCase()

let rows = await fetchActivity()

rows = rows.filter(row => {
const code = (row.code || "").toLowerCase()
const department = (row.department || "").toLowerCase()
const name = (row.name || "").toLowerCase()
const bay = (row.bay || "").toLowerCase()
const event = (row.event || "").toLowerCase()

return code.includes(codeFilter)
&& department.includes(departmentFilter)
&& name.includes(nameFilter)
&& bay.includes(bayFilter)
&& event.includes(eventFilter)
})

const tbody = document.getElementById("activityTableBody")
tbody.innerHTML = ""

rows.forEach(row => {
tbody.innerHTML += `
<tr>
<td>${new Date(row.event_time).toLocaleString()}</td>
<td>${row.code || ""}</td>
<td>${row.department || ""}</td>
<td>${row.name || ""}</td>
<td>${row.bay || ""}</td>
<td>${row.event || ""}</td>
</tr>
`
})

document.getElementById("totalEvents").innerText = rows.length
document.getElementById("uniqueCodes").innerText = new Set(rows.map(r => r.code)).size
document.getElementById("uniqueDepartments").innerText = new Set(rows.map(r => r.department)).size
document.getElementById("uniqueBays").innerText = new Set(rows.map(r => r.bay)).size

if(rows.length === 0){
tbody.innerHTML = `
<tr>
<td colspan="6">No matching activity found.</td>
</tr>
`
}

}

function clearFilters(){
document.getElementById("filterCode").value = ""
document.getElementById("filterDepartment").value = ""
document.getElementById("filterName").value = ""
document.getElementById("filterBay").value = ""
document.getElementById("filterEvent").value = ""
renderActivity()
}

renderActivity()

</script></body>
</html>
