<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WashTrac | Activity</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #06111f;
      color: #fff;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: #081827;
      border-right: 1px solid rgba(255,255,255,0.08);
      padding: 24px 18px;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 20;
    }

    .brand {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 30px;
      color: #1ea7ff;
    }

    .nav a {
      display: block;
      color: #c7d7e8;
      text-decoration: none;
      padding: 13px 14px;
      border-radius: 10px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .nav a:hover,
    .nav a.active {
      background: rgba(30,167,255,0.16);
      color: #fff;
    }

    .mobile-topbar {
      display: none;
      height: 64px;
      background: #081827;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .menu-btn {
      background: #10263a;
      color: white;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px 13px;
      font-size: 20px;
      cursor: pointer;
    }

    .main {
      margin-left: 250px;
      width: calc(100% - 250px);
      padding: 30px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
    }

    .subtitle {
      margin-top: 8px;
      color: #9fb3c8;
      font-size: 15px;
    }

    .refresh-btn {
      background: linear-gradient(180deg, #1ea7ff, #0b74c9);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(30,167,255,0.3);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .summary-card {
      background: rgba(10, 31, 51, 0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.22);
    }

    .summary-label {
      color: #9fb3c8;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .summary-value {
      font-size: 34px;
      font-weight: 800;
      color: #fff;
    }

    .panel {
      background: rgba(10, 31, 51, 0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,0.22);
    }

    .panel-header {
      padding: 18px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .panel-title {
      font-size: 20px;
      font-weight: 800;
    }

    .status {
      color: #9fb3c8;
      font-size: 14px;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 850px;
    }

    th, td {
      padding: 15px 18px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 14px;
      white-space: nowrap;
    }

    th {
      color: #9fb3c8;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: rgba(255,255,255,0.025);
    }

    td {
      color: #e8f1fb;
    }

    .event-pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(30,167,255,0.14);
      color: #7dccff;
      font-weight: 700;
      font-size: 12px;
    }

    .empty {
      padding: 28px;
      color: #9fb3c8;
      text-align: center;
      display: none;
    }

    .manual-log {
      display: none !important;
    }

    @media (max-width: 900px) {
      .mobile-topbar {
        display: flex;
      }

      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.2s ease;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .main {
        margin-left: 0;
        width: 100%;
        padding: 20px;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .page-header {
        flex-direction: column;
      }
    }

    @media (max-width: 520px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>
  <div class="mobile-topbar">
    <div class="brand">WashTrac</div>
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  </div>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">WashTrac</div>
      <nav class="nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="activity.html" class="active">Activity</a>
        <a href="codes.html">Codes</a>
        <a href="devices.html">Devices</a>
        <a href="settings.html">Settings</a>
      </nav>
    </aside>

    <main class="main">
      <div class="page-header">
        <div>
          <h1>Activity</h1>
          <div class="subtitle">Live wash events logged from CodeBox devices.</div>
        </div>
        <button class="refresh-btn" onclick="loadActivity()">Refresh</button>
      </div>

      <section class="summary-grid">
        <div class="summary-card">
          <div class="summary-label">Total Events</div>
          <div class="summary-value" id="totalEvents">0</div>
        </div>

        <div class="summary-card">
          <div class="summary-label">Unique Codes</div>
          <div class="summary-value" id="uniqueCodes">0</div>
        </div>

        <div class="summary-card">
          <div class="summary-label">Departments</div>
          <div class="summary-value" id="uniqueDepartments">0</div>
        </div>

        <div class="summary-card">
          <div class="summary-label">Bays</div>
          <div class="summary-value" id="uniqueBays">0</div>
        </div>
      </section>

      <!-- Manual Log Wash Event disabled for now -->
      <section class="manual-log"></section>

      <section class="panel">
        <div class="panel-header">
          <div class="panel-title">Wash Activity</div>
          <div class="status" id="activityStatus">Loading...</div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Code</th>
                <th>Department</th>
                <th>Device</th>
                <th>Bay</th>
                <th>Event</th>
              </tr>
            </thead>
            <tbody id="activityTableBody"></tbody>
          </table>
        </div>

        <div class="empty" id="emptyState">No activity found yet.</div>
      </section>
    </main>
  </div>

  <script>
    const SUPABASE_URL = "https://feqrsypiugwwdweiwvua.supabase.co";
    const SUPABASE_KEY = "sb_publishable_wWkZTvf6dLAlreLlLAOcXA_7jG3D8GS";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("open");
    }

    function formatDate(value) {
      if (!value) return "";

      const date = new Date(value);

      if (Number.isNaN(date.getTime())) {
        return value;
      }

      return date.toLocaleString();
    }

    function safeValue(value) {
      if (value === null || value === undefined || value === "") {
        return "—";
      }

      return String(value);
    }

    async function fetchActivity() {
      const { data, error } = await client
        .from("wash_activity")
        .select("*")
        .order("event_time", { ascending: false });

      if (error) {
        console.error("Activity fetch error:", error);
        throw error;
      }

      return (data || []).map(row => ({
        event_time: row.event_time,
        code: row.metadata?.code || "",
        department: row.department || "",
        device: row.metadata?.device || "",
        bay: row.bay || "",
        event: row.event || ""
      }));
    }

    function updateSummary(activity) {
      const totalEvents = activity.length;

      const uniqueCodes = new Set(
        activity
          .map(item => item.code)
          .filter(Boolean)
      ).size;

      const uniqueDepartments = new Set(
        activity
          .map(item => item.department)
          .filter(Boolean)
      ).size;

      const uniqueBays = new Set(
        activity
          .map(item => item.bay)
          .filter(Boolean)
      ).size;

      document.getElementById("totalEvents").textContent = totalEvents;
      document.getElementById("uniqueCodes").textContent = uniqueCodes;
      document.getElementById("uniqueDepartments").textContent = uniqueDepartments;
      document.getElementById("uniqueBays").textContent = uniqueBays;
    }

    function renderActivity(activity) {
      const tbody = document.getElementById("activityTableBody");
      const emptyState = document.getElementById("emptyState");

      tbody.innerHTML = "";

      if (!activity.length) {
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";

      activity.forEach(item => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${safeValue(formatDate(item.event_time))}</td>
          <td>${safeValue(item.code)}</td>
          <td>${safeValue(item.department)}</td>
          <td>${safeValue(item.device)}</td>
          <td>${safeValue(item.bay)}</td>
          <td><span class="event-pill">${safeValue(item.event)}</span></td>
        `;

        tbody.appendChild(tr);
      });
    }

    async function loadActivity() {
      const status = document.getElementById("activityStatus");
      status.textContent = "Loading...";

      try {
        const activity = await fetchActivity();

        console.log("Activity:", activity);

        updateSummary(activity);
        renderActivity(activity);

        status.textContent = `${activity.length} event${activity.length === 1 ? "" : "s"} loaded`;
      } catch (error) {
        status.textContent = "Unable to load activity";
        document.getElementById("emptyState").style.display = "block";
        document.getElementById("emptyState").textContent = "Activity could not be loaded. Check Supabase table access/RLS.";
      }
    }

    loadActivity();
  </script>
</body>
</html>
