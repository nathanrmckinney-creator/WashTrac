<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - WashTrac</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(
          circle at 0% 0%,
          rgba(37, 99, 235, 0.28) 0%,
          rgba(37, 99, 235, 0.18) 15%,
          rgba(37, 99, 235, 0.08) 28%,
          transparent 42%
        ),
        linear-gradient(180deg, #000814 0%, #06142d 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 70px;
      overflow: hidden;
    }

    .shell {
      width: 100%;
      max-width: 420px;
      margin-top: -30px;
    }

    .brand {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .logo-image {
      width: 300px;
      height: auto;
      display: block;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(0,0,0,.45);
    }

    .card h2 {
      margin: 0 0 20px 0;
      font-size: 26px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-size: 14px;
      font-weight: bold;
    }

    .field input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0b1220;
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    .field input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.18);
    }

    .reset-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .reset-btn:hover {
      background: #1d4ed8;
    }

    .status {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #0b1220;
      border: 1px solid #1f2937;
      color: #cbd5e1;
      display: none;
      line-height: 1.4;
    }

    .status.show {
      display: block;
    }

    .status.error {
      color: #ef4444;
    }

    .status.success {
      color: #22c55e;
    }

    @media (max-width:900px) {
      .shell {
        margin-top: -100px !important;
      }

      .logo-image {
        width: 280px;
      }

      .card {
        padding: 22px;
      }
    }
  </style>
</head>

<body>

<div class="shell">

  <div class="brand">
    <img
      src="washtrac-logo.png"
      alt="WashTrac"
      class="logo-image"
    >
  </div>

  <div class="card">
    <h2>Reset Password</h2>

    <div class="field">
      <label for="newPassword">New Password</label>
      <input
        id="newPassword"
        type="password"
        placeholder="Enter new password"
      >
    </div>

    <button class="reset-btn" onclick="resetPassword()">
      Update Password
    </button>

    <div class="status" id="statusBox"></div>
  </div>

</div>

<script>
const SUPABASE_URL = "https://feqrsypiugwwdweiwvua.supabase.co";
const SUPABASE_KEY = "sb_publishable_wWkZTvf6dLAlreLlLAOcXA_7jG3D8GS";

const client = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY,
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

function setStatus(message, type = "") {
  const box = document.getElementById("statusBox");
  box.innerText = message;
  box.className = "status show";

  if (type) {
    box.classList.add(type);
  }
}

async function resetPassword() {

  const password = document.getElementById("newPassword").value.trim();

  if (!password || password.length < 6) {
    setStatus("Password must be at least 6 characters.", "error");
    return;
  }

  const { error } = await client.auth.updateUser({
    password: password
  });

  if (error) {
    setStatus(error.message, "error");
    return;
  }

  setStatus("Password updated successfully.", "success");

  setTimeout(() => {
    window.location.href = "login.html";
  }, 2000);
}
</script>

</body>
</html>
