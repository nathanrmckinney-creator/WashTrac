<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WashTrac Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    *{box-sizing:border-box;}

    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(59,130,246,.14), transparent 35%),
        #020617;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .login-shell{width:100%;max-width:420px;}

    /* 🔥 BRAND FIX */
    .brand{
      text-align:center;
      margin-bottom:18px;
    }

    .logo{
      font-family:'Orbitron', Arial, sans-serif;
      font-size:40px;
      font-weight:800;
      letter-spacing:.5px;
    }

    .logo .trac{
      background:linear-gradient(
        180deg,
        #ffffff 0%,
        #66c7ff 40%,
        #1e9bff 72%,
        #0b5cff 100%
      );
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      -webkit-text-fill-color:transparent;
    }

    .tagline{
      margin-top:4px;
      font-family: Arial, Helvetica, sans-serif;
      font-size:16px;
      font-weight:600;
      letter-spacing:1.6px;
      color:#94a3b8;
      text-align:center;
    }

    /* ================= */

    .login-card{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:16px;
      padding:28px;
      box-shadow:0 18px 50px rgba(0,0,0,.45);
    }

    .login-card h2{margin:0 0 20px 0;font-size:26px;}

    .field{margin-bottom:16px;}

    .field label{
      display:block;
      margin-bottom:8px;
      color:#cbd5e1;
      font-size:14px;
      font-weight:bold;
    }

    .field input{
      width:100%;
      padding:14px;
      border-radius:10px;
      border:1px solid #334155;
      background:#0b1220;
      color:#fff;
      font-size:15px;
      outline:none;
    }

    .field input:focus{
      border-color:#3b82f6;
      box-shadow:0 0 0 3px rgba(59,130,246,.18);
    }

    .field input::placeholder{color:#64748b;}

    .login-btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:#fff;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    .login-btn:hover{background:#1d4ed8;}
    .login-btn:disabled{opacity:.7;cursor:not-allowed;}

    .home-btn{
      width:100%;
      margin-top:12px;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#334155;
      color:#fff;
      font-size:15px;
      font-weight:bold;
      cursor:pointer;
    }

    .status{
      margin-top:16px;
      padding:12px 14px;
      border-radius:10px;
      background:#0b1220;
      border:1px solid #1f2937;
      color:#cbd5e1;
      display:none;
      line-height:1.4;
    }

    .status.show{display:block;}
    .status.error{color:#ef4444;}
    .status.success{color:#22c55e;}

    .hint{
      margin-top:16px;
      text-align:center;
      color:#64748b;
      font-size:13px;
    }

    @media (max-width:600px){
      .logo{font-size:36px;}
      .tagline{font-size:12px;}
      .login-card{padding:22px;}
    }
  </style>
</head>

<body>
  <div class="login-shell">

    <div class="brand">
      <div class="logo">
        Wash<span class="trac">Trac</span>
      </div>
      <div class="tagline">
        Control. Track. Manage.
      </div>
    </div>

    <div class="login-card">
      <h2>Sign in</h2>

      <form onsubmit="login(event)">
        <div class="field">
          <label for="user">Email</label>
          <input id="user" type="email" placeholder="Enter email" autocomplete="email" required>
        </div>

        <div class="field">
          <label for="pass">Password</label>
          <input id="pass" type="password" placeholder="Enter password" autocomplete="current-password" required>
        </div>

        <button id="loginBtn" type="submit" class="login-btn">Login</button>

        <div style="text-align:center; margin-top:20px;">
          <span style="color:#9fb3c8;">Don't have an account?</span>
          <a href="signup.html" style="color:#1ea7ff; margin-left:6px;">
            Sign Up
          </a>
        </div>
      </form>

      <button class="home-btn" onclick="window.location.href='index.html'">Back to Homepage</button>

      <div class="status" id="statusBox"></div>

      <div class="hint">
        Press Enter after typing your password to log in.
      </div>
    </div>
  </div>

<script>
const SUPABASE_URL = "https://feqrsypiugwwdweiwvua.supabase.co";
const SUPABASE_KEY = "sb_publishable_wWkZTvf6dLAlreLlLAOcXA_7jG3D8GS";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function setStatus(message, type = "") {
  const box = document.getElementById("statusBox");
  box.innerText = message;
  box.className = "status show";
  if (type) box.classList.add(type);
}

function clearStatus() {
  const box = document.getElementById("statusBox");
  box.innerText = "";
  box.className = "status";
}

async function loadSitesForUser(userId) {
  return await client
    .from("user_sites")
    .select(`
      site_id,
      organization_id,
      can_view_all_sites,
      sites (
        id,
        name,
        organization_id
      )
    `)
    .eq("user_id", userId);
}

async function createFirstSiteForUser() {
  const pendingOrgName = localStorage.getItem("pendingOrgName");
  const pendingSiteName = localStorage.getItem("pendingSiteName");

  if (!pendingOrgName || !pendingSiteName) {
    return { error: "No company/site setup found. Please sign up again." };
  }

  const { data, error } = await client.rpc("create_customer_onboarding", {
    org_name: pendingOrgName,
    site_name: pendingSiteName
  });

  if (error) {
    return { error: error.message };
  }

  localStorage.removeItem("pendingOrgName");
  localStorage.removeItem("pendingSiteName");

  return { data };
}

async function login(event) {
  event.preventDefault();
  clearStatus();

  const btn = document.getElementById("loginBtn");
  const email = document.getElementById("user").value.trim();
  const password = document.getElementById("pass").value.trim();

  btn.disabled = true;
  btn.innerText = "Logging in...";

  try {
    if (!email || !password) {
      setStatus("Enter email and password.", "error");
      return;
    }

    const { data: loginData, error: loginError } = await client.auth.signInWithPassword({
      email,
      password
    });

    if (loginError) {
      setStatus(loginError.message, "error");
      return;
    }

    const user = loginData.user;

    let { data: siteLinks, error: siteError } = await loadSitesForUser(user.id);

    if (siteError) {
      setStatus(siteError.message, "error");
      return;
    }

    if (!siteLinks || siteLinks.length === 0) {
      setStatus("Finishing account setup...");

      const setup = await createFirstSiteForUser();

      if (setup.error) {
        setStatus(setup.error, "error");
        return;
      }

      const reload = await loadSitesForUser(user.id);

      if (reload.error) {
        setStatus(reload.error.message, "error");
        return;
      }

      siteLinks = reload.data;
    }

    if (!siteLinks || siteLinks.length === 0) {
      setStatus("Account setup failed.", "error");
      return;
    }

    const firstSite = siteLinks[0];

    localStorage.setItem("washtracLoggedIn", "yes");
    localStorage.setItem("selectedSiteId", firstSite.site_id);
    localStorage.setItem("selectedOrgId", firstSite.organization_id);
    localStorage.setItem("canViewAllSites", firstSite.can_view_all_sites ? "true" : "false");
    localStorage.setItem("availableSites", JSON.stringify(siteLinks));

    setStatus("Login successful.", "success");
    window.location.href = "dashboard.html";

  } finally {
    btn.disabled = false;
    btn.innerText = "Login";
  }
}
</script>

</body>
</html>
