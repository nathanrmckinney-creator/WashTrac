<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WashTrac Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      width: 320px;
      background: #16233f;
      padding: 30px;
      border-radius: 12px;
      box-sizing: border-box;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #42ff87;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    a {
      color: #8fb2ff;
      text-decoration: none;
      display: inline-block;
      margin-top: 14px;
    }
    .note {
      margin-top: 14px;
      color: #b9c7e6;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>WashTrac Login</h2>
    <input id="user" type="text" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="note">Test login: admin / wash123</div>
    <a href="index.html">Back to Home</a>
  </div>

  <script>
    function login() {
      var user = document.getElementById("user").value.trim().toLowerCase();
      var pass = document.getElementById("pass").value.trim();

      if (user === "admin" && pass === "wash123") {
        localStorage.setItem("washtracLoggedIn", "yes");
        window.location.href = "dashboard.html";
      } else {
        alert("Invalid username or password");
      }
    }
  </script>
</body>
</html>
