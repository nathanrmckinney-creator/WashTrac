<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WashTrac Login</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    *{box-sizing:border-box;}

  body {
  margin: 0;
  font-family: Arial, sans-serif;
  background:
    radial-gradient(
      circle at 0% 0%,
      rgba(37, 99, 235, 0.28) 0%,
      rgba(37, 99, 235, 0.18) 15%,
      rgba(37, 99, 235, 0.08) 28%,
      transparent 42%
    ),
    linear-gradient(180deg, #000814 0%, #06142d 100%);
  color: white;
  min-height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 70px;
}

    .login-shell{
  width:100%;
  max-width:420px;
  margin-top:-30px;
}

    .brand{
      display:flex;
      justify-content:center;
      align-items:center;
      margin-bottom:18px;
    }

    .logo-image{
      width:300px;
      height:auto;
      display:block;
    }

    .login-card{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:16px;
      padding:28px;
      box-shadow:0 18px 50px rgba(0,0,0,.45);
    }

    .login-card h2{margin:0 0 20px 0;font-size:26px;}

    .invite-banner{
      display:none;
      margin:0 0 18px 0;
      padding:14px 14px;
      border-radius:12px;
      background:rgba(37,99,235,.16);
      border:1px solid rgba(96,165,250,.34);
      color:#dbeafe;
      line-height:1.45;
      font-size:14px;
      box-shadow:inset 0 0 18px rgba(37,99,235,.06);
    }

    .invite-banner.show{display:block;}

    .invite-banner strong{
      color:#ffffff;
    }

    .field{margin-bottom:16px;}

    .field label{
      display:block;
      margin-bottom:8px;
      color:#cbd5e1;
      font-size:14px;
      font-weight:bold;
    }

    .field input{
      width:100%;
      padding:14px;
      border-radius:10px;
      border:1px solid #334155;
      background:#0b1220;
      color:#fff;
      font-size:15px;
      outline:none;
    }

    .field input:focus{
      border-color:#3b82f6;
      box-shadow:0 0 0 3px rgba(59,130,246,.18);
    }

    .field input::placeholder{color:#64748b;}

    .login-btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:#fff;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    .login-btn:hover{background:#1d4ed8;}
    .login-btn:disabled{opacity:.7;cursor:not-allowed;}

    .home-btn{
      width:100%;
      margin-top:12px;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#334155;
      color:#fff;
      font-size:15px;
      font-weight:bold;
      cursor:pointer;
    }

    .status{
      margin-top:16px;
      padding:12px 14px;
      border-radius:10px;
      background:#0b1220;
      border:1px solid #1f2937;
      color:#cbd5e1;
      display:none;
      line-height:1.4;
    }

    .status.show{display:block;}
    .status.error{color:#ef4444;}
    .status.success{color:#22c55e;}

    .hint{
      margin-top:16px;
      text-align:center;
      color:#64748b;
      font-size:13px;
    }

@media (min-width:901px) and (max-width:1400px) and (orientation:landscape){

  body{
    padding-top:20px;
  }

  .login-shell{
    margin-top:-20px;
  }

}

@media (max-width:900px){
  .login-shell{
    margin-top:-40px !important;
  }

  .logo-image{
    width:280px;
  }

  .login-card{
    padding:22px;
  }
}
</style>
</head>

<body>
  <div class="login-shell">

    <div class="brand">
      <img
        src="washtrac-logo.png"
        alt="WashTrac"
        class="logo-image"
      >
    </div>

    <div class="login-card">
      <h2 id="loginTitle">Sign in</h2>

      <div class="invite-banner" id="inviteBanner"></div>

      <form onsubmit="login(event)">
        <div class="field">
          <label for="user">Email</label>
          <input id="user" type="email" placeholder="Enter email" autocomplete="email" required>
        </div>

        <div class="field">
          <label for="pass">Password</label>
          <input id="pass" type="password" placeholder="Enter password" autocomplete="current-password" required>
        </div>

        <button id="loginBtn" type="submit" class="login-btn">Login</button>

<div style="text-align:center; margin-top:14px;">
  <a
    href="#"
    onclick="forgotPassword()"
    style="
      color:#1ea7ff;
      text-decoration:none;
      font-size:14px;
    "
  >
    Forgot Password?
  </a>
</div>

        <div style="text-align:center; margin-top:20px;">
          <span style="color:#9fb3c8;">Don't have an account?</span>
          <a id="signupLink" href="signup.html" style="color:#1ea7ff; margin-left:6px;">
            Sign Up
          </a>
        </div>
      </form>

      <button class="home-btn" onclick="window.location.href='index.html'">Back to Homepage</button>

      <div class="status" id="statusBox"></div>

      <div class="hint">
        Press Enter after typing your password to log in.
      </div>
    </div>
  </div>

<script>
const SUPABASE_URL = "https://feqrsypiugwwdweiwvua.supabase.co";
const SUPABASE_KEY = "sb_publishable_wWkZTvf6dLAlreLlLAOcXA_7jG3D8GS";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true,
    storage: window.localStorage
  }
});

const urlParams = new URLSearchParams(window.location.search);
const inviteCodeFromUrl = String(urlParams.get("invite") || "").trim();
const inviteEmailFromUrl = String(urlParams.get("email") || "").trim().toLowerCase();

function hasInviteLink(){
  return !!inviteCodeFromUrl;
}

function setStatus(message, type = "") {
  const box = document.getElementById("statusBox");
  box.innerText = message;
  box.className = "status show";
  if (type) box.classList.add(type);
}

function clearStatus() {
  const box = document.getElementById("statusBox");
  box.innerText = "";
  box.className = "status";
}

function normalizeEmail(email){
  return String(email || "").trim().toLowerCase();
}

function escapeText(value){
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function setupInviteUi(){
  if(!hasInviteLink()) return;

  const title = document.getElementById("loginTitle");
  const banner = document.getElementById("inviteBanner");
  const emailInput = document.getElementById("user");
  const signupLink = document.getElementById("signupLink");

  if(title){
    title.innerText = "Accept Invite";
  }

  if(inviteEmailFromUrl && emailInput){
    emailInput.value = inviteEmailFromUrl;
  }

  if(signupLink){
    const qs = new URLSearchParams();
    qs.set("invite", inviteCodeFromUrl);
    if(inviteEmailFromUrl) qs.set("email", inviteEmailFromUrl);
    signupLink.href = `signup.html?${qs.toString()}`;
  }

  if(banner){
    const emailLine = inviteEmailFromUrl
      ? `<br>Use <strong>${escapeText(inviteEmailFromUrl)}</strong> to sign in or create your account.`
      : "";

    banner.innerHTML = `
      You've been invited to access a WashTrac site.
      ${emailLine}
      <br>After login, WashTrac will automatically link your account to the invited site.
    `;
    banner.className = "invite-banner show";
  }
}

setupInviteUi();

async function loadSitesFromUserSites(userId) {
  return await client
    .from("user_sites")
    .select(`
      site_id,
      organization_id,
      can_view_all_sites,
      sites (
        id,
        name,
        organization_id
      )
    `)
    .eq("user_id", userId);
}

async function loadSitesFromUserSiteAccess(userId) {
  const { data, error } = await client
    .from("user_site_access")
    .select(`
      site_id,
      role,
      sites (
        id,
        name,
        organization_id
      )
    `)
    .eq("user_id", userId);

  if(error){
    return { data:null, error };
  }

  const normalized = (data || [])
    .filter(row => row && row.site_id)
    .map(row => ({
      site_id: row.site_id,
      organization_id: row.sites?.organization_id || "",
      can_view_all_sites: String(row.role || "").toLowerCase() === "owner" || String(row.role || "").toLowerCase() === "admin",
      role: row.role || "viewer",
      sites: row.sites || null
    }));

  return { data: normalized, error:null };
}

async function loadSitesForUser(userId) {
  let primary = await loadSitesFromUserSites(userId);

  if(!primary.error && primary.data && primary.data.length){
    return primary;
  }

  const fallback = await loadSitesFromUserSiteAccess(userId);

  if(!fallback.error && fallback.data && fallback.data.length){
    return fallback;
  }

  if(primary.error && fallback.error){
    return primary;
  }

  return primary;
}

function saveLoginSiteState(siteLinks){
  const firstSite = siteLinks[0];
  const firstSiteId = firstSite.site_id || firstSite.sites?.id || "";
  const firstOrgId = firstSite.organization_id || firstSite.sites?.organization_id || "";

  localStorage.setItem("washtracLoggedIn", "yes");

  localStorage.setItem("selectedSiteId", firstSiteId);
  localStorage.setItem("selectedOrgId", firstOrgId);

  localStorage.setItem("activeSiteId", firstSiteId);
  localStorage.setItem("washtracActiveSiteId", firstSiteId);
  localStorage.setItem("activeOrganizationId", firstOrgId);

  localStorage.setItem("canViewAllSites", firstSite.can_view_all_sites ? "true" : "false");
  localStorage.setItem("availableSites", JSON.stringify(siteLinks));
}

async function getPendingInviteByCode(inviteCode, email){
  let query = client
    .from("site_invites")
    .select("*")
    .eq("invite_code", inviteCode)
    .is("accepted_at", null)
    .limit(1);

  if(email){
    query = query.eq("email", normalizeEmail(email));
  }

  const { data, error } = await query;

  if(error){
    return { invite:null, error };
  }

  return { invite:(data && data.length ? data[0] : null), error:null };
}

async function acceptInviteForUser(user){
  if(!hasInviteLink()){
    return { accepted:false, skipped:true };
  }

  if(!user?.id){
    return { accepted:false, skipped:false, error:"No logged-in user found for invite." };
  }

  const loginEmail = normalizeEmail(user.email || "");
  const invitedEmail = normalizeEmail(inviteEmailFromUrl || loginEmail);

  if(inviteEmailFromUrl && loginEmail && loginEmail !== invitedEmail){
    return {
      accepted:false,
      skipped:false,
      error:`This invite was sent to ${invitedEmail}. Please sign in with that same email.`
    };
  }

  const inviteResult = await getPendingInviteByCode(inviteCodeFromUrl, invitedEmail);

  if(inviteResult.error){
    return {
      accepted:false,
      skipped:false,
      error:inviteResult.error.message || "Could not look up this invite."
    };
  }

  const invite = inviteResult.invite;

  if(!invite){
    return {
      accepted:false,
      skipped:false,
      error:"This invite was not found, already accepted, or removed."
    };
  }

  if(invite.expires_at && new Date(invite.expires_at) < new Date()){
    return {
      accepted:false,
      skipped:false,
      error:"This invite has expired. Ask the site owner to send a new invite."
    };
  }

  const { data: existingAccess, error: existingError } = await client
    .from("user_site_access")
    .select("id")
    .eq("user_id", user.id)
    .eq("site_id", invite.site_id)
    .limit(1);

  if(existingError){
    return {
      accepted:false,
      skipped:false,
      error:existingError.message || "Could not check existing site access."
    };
  }

  if(!existingAccess || !existingAccess.length){
    let accessResult = await client
      .from("user_site_access")
      .insert([{
        user_id: user.id,
        site_id: invite.site_id,
        role: invite.role || "viewer",
        email: normalizeEmail(user.email || invite.email)
      }]);

    if(accessResult.error && String(accessResult.error.message || "").toLowerCase().includes("email")){
      accessResult = await client
        .from("user_site_access")
        .insert([{
          user_id: user.id,
          site_id: invite.site_id,
          role: invite.role || "viewer"
        }]);
    }

    if(accessResult.error){
      return {
        accepted:false,
        skipped:false,
        error:accessResult.error.message || "Could not link this invite to your account."
      };
    }
  }

  const { error: acceptError } = await client
    .from("site_invites")
    .update({
      accepted_at: new Date().toISOString(),
      accepted_by: user.id
    })
    .eq("id", invite.id);

  if(acceptError){
    return {
      accepted:false,
      skipped:false,
      error:acceptError.message || "Access was linked, but the invite could not be marked accepted."
    };
  }

  localStorage.setItem("activeSiteId", invite.site_id);
  localStorage.setItem("selectedSiteId", invite.site_id);

  return { accepted:true, invite };
}

async function restoreLoggedInUser(userId) {
  const { data: siteLinks, error } = await loadSitesForUser(userId);

  if (error || !siteLinks || siteLinks.length === 0) {
    return false;
  }

  saveLoginSiteState(siteLinks);

  return true;
}

async function checkExistingSession() {
  try {
    const { data } = await client.auth.getSession();
    const session = data && data.session;

    if (session && session.user) {
      if(hasInviteLink()){
        setStatus("Accepting invite...", "");

        const inviteResult = await acceptInviteForUser(session.user);

        if(!inviteResult.accepted && !inviteResult.skipped){
          setStatus(inviteResult.error || "Could not accept invite.", "error");
          return;
        }
      }

      const restored = await restoreLoggedInUser(session.user.id);

      if (restored) {
        window.location.replace("dashboard.html");
      }
    }
  } catch (err) {
    console.log("Session restore error:", err);
  }
}

checkExistingSession();

async function createFirstSiteForUser() {
  const pendingOrgName = localStorage.getItem("pendingOrgName");
  const pendingSiteName = localStorage.getItem("pendingSiteName");

  if (!pendingOrgName || !pendingSiteName) {
    return { error: "No company/site setup found. Please sign up again." };
  }

  const { data, error } = await client.rpc("create_customer_onboarding", {
    org_name: pendingOrgName,
    site_name: pendingSiteName
  });

  if (error) {
    return { error: error.message };
  }

  localStorage.removeItem("pendingOrgName");
  localStorage.removeItem("pendingSiteName");

  return { data };
}

async function forgotPassword() {
  clearStatus();

  const email = document.getElementById("user").value.trim();

  if (!email) {
    setStatus("Enter your email first.", "error");
    return;
  }

  const { error } = await client.auth.resetPasswordForEmail(email, {
    redirectTo: "https://thewashtrac.com/reset-password.html"
  });

  if (error) {
    setStatus(error.message, "error");
    return;
  }

  setStatus("Password reset email sent. Check your inbox.", "success");
}

async function login(event) {
  event.preventDefault();
  clearStatus();

  const btn = document.getElementById("loginBtn");
  const email = document.getElementById("user").value.trim();
  const password = document.getElementById("pass").value.trim();

  btn.disabled = true;
  btn.innerText = hasInviteLink() ? "Accepting..." : "Logging in...";

  try {
    if (!email || !password) {
      setStatus("Enter email and password.", "error");
      return;
    }

    if(hasInviteLink() && inviteEmailFromUrl && normalizeEmail(email) !== inviteEmailFromUrl){
      setStatus(`This invite was sent to ${inviteEmailFromUrl}. Please use that email.`, "error");
      return;
    }

    const { data: loginData, error: loginError } = await client.auth.signInWithPassword({
      email,
      password
    });

    if (loginError) {
      setStatus(loginError.message, "error");
      return;
    }

    const user = loginData.user;

    if(hasInviteLink()){
      setStatus("Login successful. Accepting invite...");

      const inviteResult = await acceptInviteForUser(user);

      if(!inviteResult.accepted && !inviteResult.skipped){
        setStatus(inviteResult.error || "Could not accept invite.", "error");
        return;
      }
    }

    let { data: siteLinks, error: siteError } = await loadSitesForUser(user.id);

    if (siteError) {
      setStatus(siteError.message, "error");
      return;
    }

    if (!siteLinks || siteLinks.length === 0) {
      setStatus("Finishing account setup...");

      const setup = await createFirstSiteForUser();

      if (setup.error) {
        setStatus(setup.error, "error");
        return;
      }

      const reload = await loadSitesForUser(user.id);

      if (reload.error) {
        setStatus(reload.error.message, "error");
        return;
      }

      siteLinks = reload.data;
    }

    if (!siteLinks || siteLinks.length === 0) {
      setStatus("Account setup failed.", "error");
      return;
    }

    saveLoginSiteState(siteLinks);

    setStatus(hasInviteLink() ? "Invite accepted. Opening dashboard..." : "Login successful.", "success");
    window.location.replace("dashboard.html");

  } finally {
    btn.disabled = false;
    btn.innerText = "Login";
  }
}
</script>

</body>
</html>
