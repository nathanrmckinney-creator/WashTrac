<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WashTrac Login</title>
  <style>
    *{box-sizing:border-box;}
    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(59,130,246,.14), transparent 35%),
        #020617;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .login-shell{
      width:100%;
      max-width:420px;
    }
    .brand{
      text-align:center;
      margin-bottom:18px;
    }
    .brand h1{
      margin:0 0 8px 0;
      font-size:42px;
    }
    .brand p{
      margin:0;
      color:#94a3b8;
      font-size:15px;
    }
    .login-card{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:16px;
      padding:28px;
      box-shadow:0 18px 50px rgba(0,0,0,.45);
    }
    .login-card h2{
      margin:0 0 20px 0;
      font-size:26px;
    }
    .field{
      margin-bottom:16px;
    }
    .field label{
      display:block;
      margin-bottom:8px;
      color:#cbd5e1;
      font-size:14px;
      font-weight:bold;
    }
    .field input{
      width:100%;
      padding:14px;
      border-radius:10px;
      border:1px solid #334155;
      background:#0b1220;
      color:#fff;
      font-size:15px;
      outline:none;
    }
    .field input:focus{
      border-color:#3b82f6;
      box-shadow:0 0 0 3px rgba(59,130,246,.18);
    }
    .field input::placeholder{
      color:#64748b;
    }
    .login-btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:#fff;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }
    .login-btn:hover{
      background:#1d4ed8;
    }
    .home-btn{
      width:100%;
      margin-top:12px;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#334155;
      color:#fff;
      font-size:15px;
      font-weight:bold;
      cursor:pointer;
    }
    .status{
      margin-top:16px;
      padding:12px 14px;
      border-radius:10px;
      background:#0b1220;
      border:1px solid #1f2937;
      color:#cbd5e1;
      display:none;
      line-height:1.4;
    }
    .status.show{
      display:block;
    }
    .hint{
      margin-top:16px;
      text-align:center;
      color:#64748b;
      font-size:13px;
    }
    @media (max-width:600px){
      .brand h1{font-size:36px;}
      .login-card{padding:22px;}
    }
  .hint{
  margin-top:16px;
  text-align:center;
  color:#64748b;
  font-size:13px;
}

.brand-accent{
  color:#2ea8ff;
}

@media (max-width:600px){
  .brand h1{font-size:36px;}
  .login-card{padding:22px;}
}
  </style>
</head>
<body>
  <div class="login-shell">
    <div class="brand">
      <h1>Wash<span class="brand-accent">Trac</span></h1>
      <p>Control. Track. Manage.</p>
    </div>

    <div class="login-card">
      <h2>Sign in</h2>

      <form onsubmit="login(event)">
        <div class="field">
          <label for="user">Username</label>
          <input id="user" type="text" placeholder="Enter username" autocomplete="username" required>
        </div>

        <div class="field">
          <label for="pass">Password</label>
          <input id="pass" type="password" placeholder="Enter password" autocomplete="current-password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
       
        <div style="text-align:center; margin-top:20px;">
  <span style="color:#9fb3c8;">Don't have an account?</span>
  <a href="signup.html" style="color:#1ea7ff; margin-left:6px; text-decoration:none;">
    Sign Up
  </a>
</div> 
      </form>

      <button class="home-btn" onclick="window.location.href='index.html'">Back to Homepage</button>

      <div class="status" id="statusBox"></div>

      <div class="hint">
        Press Enter after typing your password to log in.
      </div>
    </div>
  </div>

  <script>
    function setStatus(message){
      const box = document.getElementById("statusBox");
      box.innerText = message;
      box.classList.add("show");
    }

    function clearStatus(){
      const box = document.getElementById("statusBox");
      box.innerText = "";
      box.classList.remove("show");
    }

    function login(event){
      event.preventDefault();
      clearStatus();

      const user = document.getElementById("user").value.trim().toLowerCase();
      const pass = document.getElementById("pass").value.trim();

      if(user === "admin" && pass === "Ami2025"){
        localStorage.setItem("washtracLoggedIn", "yes");
        window.location.href = "dashboard.html";
        return;
      }

      setStatus("Invalid username or password.");
    }
  </script>
</body>
</html>
