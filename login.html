<!DOCTYPE html>
<html>
<head>
<title>WashTrac Login</title>

<style>

body{
font-family:Arial;
background:#0b1220;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.card{
background:#16233f;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:12px;
background:#42ff87;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

</style>

<script>

function login(){

var user = document.getElementById("user").value
var pass = document.getElementById("pass").value

if(user=="admin" && pass=="wash123"){

window.location="dashboard.html"

}

else{

alert("Invalid Login")

}

}

</script>

</head>

<body>

<div class="card">

<h2>WashTrac Login</h2>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</body>
</html>
