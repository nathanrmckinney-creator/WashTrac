<!DOCTYPE html>
<html>
<head>
  <title>WashTrac Monitor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      margin:0;
      background:#020617;
      color:white;
      font-family:Arial,Helvetica,sans-serif;
      padding:0;
    }

    .app-shell {
  display: flex;
  min-height: 100vh;
}

 .sidebar {
  width: 190px;
  background: linear-gradient(180deg, #0d2f73 0%, #0b2354 100%);
  border-right: 1px solid rgba(96, 165, 250, 0.18);
  padding: 18px 16px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
}

.sidebar-brand {
  font-size: 24px;
  font-weight: 800;
  color: #ffffff;
  margin-bottom: 26px;
}

.sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.sidebar-nav a,
.sidebar-footer a {
  color: #dbe7ff;
  text-decoration: none;
  padding: 8px 10px;
  border-radius: 8px;
  display: block;
  font-weight: 600;
  transition: background 0.2s ease, color 0.2s ease;
}

.sidebar-nav a:hover,
.sidebar-footer a:hover {
  background: rgba(59, 130, 246, 0.14);
}

.sidebar-nav a.active {
  background: linear-gradient(90deg, #1d8fff 0%, #2aa8ff 100%);
  color: #ffffff;
  font-weight: 700;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
}

.sidebar-footer {
  margin-top: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding-top: 22px;
  border-top: 1px solid rgba(148, 163, 184, 0.16);
}

.logout-link {
  color: #ff7f7f;
}
    
.app-main {
  flex: 1;
  padding: 24px;
  box-sizing: border-box;
}

.card-span-full {
  grid-column: 1 / -1;
}
    
    h1{
      font-size:32px;
      margin-top:0;
      margin-bottom:18px;
    }

    .banner{
      width:100%;
      padding:20px;
      text-align:center;
      font-size:28px;
      font-weight:bold;
      border-radius:10px;
      margin-bottom:25px;
    }

    .green{background:#14532d;color:#86efac}
    .red{background:#7f1d1d;color:#fecaca}
    .yellow{background:#78350f;color:#fde68a}

    .card{
      background:#111827;
      padding:20px;
      border-radius:10px;
      margin-bottom:20px;
      border:1px solid #1f2937;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr 1fr 1fr;
      gap:20px;
      margin-bottom:20px;
    }

    .bay-grid{
      display:grid;
      grid-template-columns:1fr 1fr 1fr 1fr;
      gap:20px;
      margin-bottom:20px;
    }

    .bay-card{
      background:#0b1220;
      border:1px solid #1f2937;
      border-radius:12px;
      padding:18px;
      text-align:center;
    }

    .bay-card h3{
      margin:0 0 10px 0;
      font-size:20px;
    }

    .bay-dot{
      width:18px;
      height:18px;
      border-radius:50%;
      display:inline-block;
      margin-right:8px;
      vertical-align:middle;
    }

    .dot-ready{background:#22c55e;box-shadow:0 0 12px rgba(34,197,94,.45)}
    .dot-running{background:#38bdf8;box-shadow:0 0 12px rgba(56,189,248,.45)}
    .dot-idle{background:#f59e0b;box-shadow:0 0 12px rgba(245,158,11,.35)}
    .dot-offline{background:#ef4444;box-shadow:0 0 12px rgba(239,68,68,.35)}

    .bay-status{
      font-size:18px;
      font-weight:bold;
    }

    .status-pill{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      font-weight:bold;
    }

    .on{background:#14532d;color:#86efac}
    .off{background:#7f1d1d;color:#fca5a5}
    .warn{background:#78350f;color:#fcd34d}

    .activity-row{
      display:flex;
      justify-content:space-between;
      border-bottom:1px solid #1f2937;
      padding:10px 0;
      gap:14px;
    }

    @media (max-width:1100px){
      .grid,.bay-grid{
        grid-template-columns:1fr 1fr;
      }
      
  </style>
</head>

  <body>
  <div class="app">
<div class="sidebar">
<div class="logo">Wash<span class="brand-accent">Trac</span></div>
<div class="nav">
<a href="dashboard.html">Dashboard</a>
<a href="codes.html">Codes</a>
<a href="activity.html">Activity</a>
<a href="usage.html">Reports</a>
<a href="monitor.html">Monitor</a>
</div>
<div class="sidebar-bottom">
<a href="index.html">Back to Homepage</a>
<a href="#" class="logout-link" onclick="logout()">Logout</a>
</div>
    </aside>

    <main class="app-main">
      <h1>WashTrac System Monitor</h1>

      <div id="systemBanner" class="banner green">
        SYSTEM ONLINE
      </div>

      <div class="bay-grid" id="bayGrid"></div>

      <div class="grid">
        <div class="card">
          <h3>Wash Status</h3>
          <div id="washStatus"></div>
        </div>

        <div class="card">
          <h3>E-STOP</h3>
          <div id="estopStatus"></div>
        </div>

        <div class="card">
          <h3>Scheduled Lockout</h3>
          <div id="lockoutStatus"></div>
        </div>

        <div class="card">
          <h3>Lockout Window</h3>
          <div id="lockoutWindow"></div>
        </div>

        <div class="card card-span-full">
          <h3>Recent Activity</h3>
          <div id="activity"></div>
        </div>
      </div>
    </main>
  </div>

<script>
    const SUPABASE_URL="https://feqrsypiugwwdweiwvua.supabase.co";
    const SUPABASE_KEY="sb_publishable_wWkZTvf6dLAlreLlLAOcXA_7jG3D8GS";
    const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

    function toggleMenu(){
      const menu=document.getElementById("menuPanel");
      const backdrop=document.getElementById("backdrop");
      const isOpen=menu.style.display==="flex";
      menu.style.display=isOpen ? "none" : "flex";
      backdrop.style.display=isOpen ? "none" : "block";
    }

    function closeMenu(){
      document.getElementById("menuPanel").style.display="none";
      document.getElementById("backdrop").style.display="none";
    }

    function checkLockout(control){
      if(!control.lockout_enabled) return false;
      if(!control.lockout_start || !control.lockout_end) return false;

      const now=new Date();
      const nowMinutes=now.getHours()*60+now.getMinutes();

      const start=control.lockout_start.split(":");
      const end=control.lockout_end.split(":");

      const startMin=parseInt(start[0])*60+parseInt(start[1]);
      const endMin=parseInt(end[0])*60+parseInt(end[1]);

      if(startMin <= endMin){
        return nowMinutes >= startMin && nowMinutes <= endMin;
      }else{
        return nowMinutes >= startMin || nowMinutes <= endMin;
      }
    }

    function getBayDotClass(status){
      const value=(status||"").toLowerCase();
      if(value==="ready") return "dot-ready";
      if(value==="running") return "dot-running";
      if(value==="offline") return "dot-offline";
      return "dot-idle";
    }

    function renderBays(bays){
      const wrap=document.getElementById("bayGrid");
      wrap.innerHTML="";

      if(!bays || !bays.length){
        wrap.innerHTML=`
          <div class="bay-card">
            <h3>No Bays Found</h3>
            <div class="bay-status">Add rows in bay_status</div>
          </div>
        `;
        return;
      }

      bays.forEach(bay=>{
        wrap.innerHTML += `
          <div class="bay-card">
            <h3>${bay.bay_name}</h3>
            <div class="bay-status">
              <span class="bay-dot ${getBayDotClass(bay.status)}"></span>
              ${bay.status || "Idle"}
            </div>
          </div>
        `;
      });
    }

    async function loadMonitor(){
      const {data:control}=await client
        .from("system_control")
        .select("*")
        .limit(1)
        .single();

      if(control){
        document.getElementById("washStatus").innerHTML=
          control.wash_enabled
          ? '<span class="status-pill on">Enabled</span>'
          : '<span class="status-pill off">Disabled</span>';

        document.getElementById("estopStatus").innerHTML=
          control.estop_active
          ? '<span class="status-pill warn">ACTIVE</span>'
          : '<span class="status-pill on">Clear</span>';

        document.getElementById("lockoutStatus").innerHTML=
          control.lockout_enabled
          ? '<span class="status-pill warn">Enabled</span>'
          : '<span class="status-pill off">Disabled</span>';

        document.getElementById("lockoutWindow").innerText=
          (control.lockout_start||"--:--")+" to "+(control.lockout_end||"--:--");

        const banner=document.getElementById("systemBanner");

        if(control.estop_active){
          banner.className="banner red";
          banner.innerText="🚨 EMERGENCY STOP ACTIVE";
        }
        else if(!control.wash_enabled){
          banner.className="banner red";
          banner.innerText="WASH SYSTEM DISABLED";
        }
        else if(checkLockout(control)){
          banner.className="banner yellow";
          banner.innerText="AFTER HOURS LOCKOUT ACTIVE";
        }
        else{
          banner.className="banner green";
          banner.innerText="SYSTEM ONLINE";
        }
      }

      const {data:bays}=await client
        .from("bay_status")
        .select("*")
        .order("bay_name",{ascending:true});

      renderBays(bays || []);

      const {data:activity}=await client
        .from("activity")
        .select("*")
        .order("event_time",{ascending:false})
        .limit(10);

      let html="";

      (activity || []).forEach(row=>{
        html += `
          <div class="activity-row">
            <div>${new Date(row.event_time).toLocaleTimeString()}</div>
            <div>${row.code || ""}</div>
            <div>${row.event || ""}</div>
          </div>
        `;
      });

      document.getElementById("activity").innerHTML=html;
    }

    loadMonitor();

    client.channel("monitor-live")
  .on("postgres_changes",{event:"*",schema:"public",table:"activity"},()=>loadMonitor())
  .on("postgres_changes",{event:"*",schema:"public",table:"system_control"},()=>loadMonitor())
  .on("postgres_changes",{event:"*",schema:"public",table:"bay_status"},()=>loadMonitor())
  .subscribe();

setInterval(() => {
  console.log("WashTrac heartbeat");
}, 20000);

    function reconnectRealtime() {
  client.channel("reconnect-test")
    .subscribe((status) => {

      if (status === "SUBSCRIBED") {
        console.log("Realtime connected");
      }

      if (status === "CHANNEL_ERROR") {
        console.log("Realtime reconnecting...");
        setTimeout(reconnectRealtime, 2000);
      }

    });
}

reconnectRealtime();
</script>
</body>
</html>
