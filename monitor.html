<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WashTrac Live Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Arial, Helvetica, sans-serif;background:#020617;color:white;overflow-x:hidden;}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:#0f172a;border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:1000;gap:12px;flex-wrap:wrap;}
.brand{font-size:24px;font-weight:bold;}
.top-actions{display:flex;gap:10px;flex-wrap:wrap;}
button{padding:10px 14px;border:none;border-radius:8px;cursor:pointer;background:#2563eb;color:white;font-weight:bold;}
button.secondary{background:#334155;}
button.active{outline:2px solid #60a5fa;}
.main{padding:20px;}
.hero{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:20px;flex-wrap:wrap;}
.hero h1{margin:0 0 8px 0;font-size:38px;}
.hero p{margin:0;color:#94a3b8;}
.live-pill{display:inline-block;padding:6px 10px;border-radius:999px;background:rgba(34,197,94,.15);color:#86efac;font-size:12px;font-weight:bold;margin-left:10px;}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.summary-box{background:#111827;padding:18px;border-radius:10px;}
.summary-box strong{display:block;font-size:30px;margin-bottom:6px;}
.summary-box span{color:#94a3b8;font-size:14px;}
.grid{display:grid;grid-template-columns:1.2fr .8fr;gap:20px;}
.card{background:#111827;padding:20px;border-radius:10px;margin-bottom:20px;}
.card h3{margin:0 0 16px 0;}
.monitor-list{display:flex;flex-direction:column;gap:12px;max-height:60vh;overflow-y:auto;padding-right:4px;}
.monitor-row{display:grid;grid-template-columns:150px 120px 1fr 110px 140px;gap:12px;align-items:center;padding:16px;border-radius:10px;background:#0b1220;border:1px solid #1f2937;}
.monitor-time{font-size:18px;font-weight:bold;color:#93c5fd;}
.monitor-code{font-size:22px;font-weight:bold;}
.monitor-name{color:#dbe5fb;}
.monitor-bay{text-align:center;font-weight:bold;}
.monitor-event{text-align:right;color:#86efac;font-weight:bold;}
.manager-table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:760px;}
th,td{padding:12px 8px;border-bottom:1px solid #1f2937;text-align:left;}
th{color:#93c5fd;font-size:13px;text-transform:uppercase;letter-spacing:.5px;}
.list-row{display:flex;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid #1f2937;color:#dbe5fb;}
.list-row:last-child{border-bottom:none;}
.empty{padding:20px;background:#0b1220;border-radius:10px;color:#94a3b8;}
.hidden{display:none;}
@media (max-width:1100px){
.summary{grid-template-columns:1fr 1fr;}
.grid{grid-template-columns:1fr;}
.monitor-row{grid-template-columns:1fr;text-align:left;}
.monitor-bay,.monitor-event{text-align:left;}
}
@media (max-width:700px){
.hero h1{font-size:32px;}
.summary{grid-template-columns:1fr;}
.topbar{align-items:flex-start;}
.top-actions{width:100%;}
}
</style>
</head>
<body>
<script>
if(localStorage.getItem("washtracLoggedIn") !== "yes"){
  window.location.href = "login.html";
}
</script>

<div class="topbar">
<div class="brand">WashTrac</div>
<div class="top-actions">
<button id="operatorBtn" class="active" onclick="setMode('operator')">Operator Mode</button>
<button id="managerBtn" class="secondary" onclick="setMode('manager')">Manager Mode</button>
<button class="secondary" onclick="window.location.href='dashboard.html'">Dashboard</button>
<button class="secondary" onclick="window.location.href='index.html'">Homepage</button>
<button class="secondary" onclick="logout()">Logout</button>
</div>
</div>

<div class="main">
<div class="hero">
<div>
<h1>Live Monitor <span class="live-pill">LIVE</span></h1>
<p>Real-time wash activity feed for operators and managers.</p>
</div>
</div>

<div class="summary">
<div class="summary-box"><strong id="totalEvents">0</strong><span>Total Activity Records</span></div>
<div class="summary-box"><strong id="lastCode">-</strong><span>Last Code Used</span></div>
<div class="summary-box"><strong id="lastBay">-</strong><span>Last Bay</span></div>
<div class="summary-box"><strong id="lastUpdated">-</strong><span>Last Updated</span></div>
</div>

<div id="operatorMode">
<div class="card">
<h3>Operator Feed</h3>
<div id="operatorFeed" class="monitor-list"></div>
</div>
</div>

<div id="managerMode" class="hidden">
<div class="grid">
<div class="card">
<h3>Manager Activity Table</h3>
<div class="manager-table-wrap">
<table>
<thead>
<tr>
<th>Time</th>
<th>Code</th>
<th>Department</th>
<th>Name</th>
<th>Bay</th>
<th>Event</th>
</tr>
</thead>
<tbody id="managerTableBody"></tbody>
</table>
</div>
</div>

<div>
<div class="card">
<h3>Top Codes</h3>
<div id="topCodesList"></div>
</div>

<div class="card">
<h3>Top Departments</h3>
<div id="topDepartmentsList"></div>
</div>
</div>
</div>
</div>
</div>

<script>
const SUPABASE_URL = "https://feqrsypiugwwdweiwvua.supabase.co";
const SUPABASE_KEY = "sb_publishable_wWkZTvf6dLAlreLlLAOcXA_7jG3D8GS";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function logout(){
  localStorage.removeItem("washtracLoggedIn");
  window.location.href = "login.html";
}

function setMode(mode){
  const operatorMode = document.getElementById("operatorMode");
  const managerMode = document.getElementById("managerMode");
  const operatorBtn = document.getElementById("operatorBtn");
  const managerBtn = document.getElementById("managerBtn");

  if(mode === "operator"){
    operatorMode.classList.remove("hidden");
    managerMode.classList.add("hidden");
    operatorBtn.className = "active";
    managerBtn.className = "secondary";
  } else {
    managerMode.classList.remove("hidden");
    operatorMode.classList.add("hidden");
    managerBtn.className = "active";
    operatorBtn.className = "secondary";
  }
}

async function fetchActivity(){
  const { data, error } = await client.from("activity").select("*").order("event_time", { ascending:false }).limit(25);
  if(error){ console.log(error); return []; }
  return data || [];
}

async function fetchCodes(){
  const { data, error } = await client.from("codes").select("*").order("uses", { ascending:false }).limit(10);
  if(error){ console.log(error); return []; }
  return data || [];
}

function renderSummary(activity){
  document.getElementById("totalEvents").innerText = activity.length;
  if(activity.length){
    document.getElementById("lastCode").innerText = activity[0].code || "-";
    document.getElementById("lastBay").innerText = activity[0].bay || "-";
  } else {
    document.getElementById("lastCode").innerText = "-";
    document.getElementById("lastBay").innerText = "-";
  }
  document.getElementById("lastUpdated").innerText = new Date().toLocaleTimeString();
}

function renderOperatorFeed(activity){
  const wrap = document.getElementById("operatorFeed");
  wrap.innerHTML = "";
  if(!activity.length){
    wrap.innerHTML = `<div class="empty">No activity yet.</div>`;
    return;
  }
  activity.forEach(row => {
    wrap.innerHTML += `
      <div class="monitor-row">
        <div class="monitor-time">${new Date(row.event_time).toLocaleTimeString()}</div>
        <div class="monitor-code">${row.code || ""}</div>
        <div class="monitor-name">${row.department || ""}${row.name ? " — " + row.name : ""}</div>
        <div class="monitor-bay">${row.bay || ""}</div>
        <div class="monitor-event">${row.event || ""}</div>
      </div>
    `;
  });
}

function renderManagerTable(activity){
  const tbody = document.getElementById("managerTableBody");
  tbody.innerHTML = "";
  if(!activity.length){
    tbody.innerHTML = `<tr><td colspan="6">No activity yet.</td></tr>`;
    return;
  }
  activity.forEach(row => {
    tbody.innerHTML += `
      <tr>
        <td>${new Date(row.event_time).toLocaleString()}</td>
        <td>${row.code || ""}</td>
        <td>${row.department || ""}</td>
        <td>${row.name || ""}</td>
        <td>${row.bay || ""}</td>
        <td>${row.event || ""}</td>
      </tr>
    `;
  });
}

function buildDepartmentTotals(codes){
  const map = {};
  codes.forEach(item => {
    const department = item.department || "Unassigned";
    const uses = Number(item.uses || 0);
    if(!map[department]) map[department] = 0;
    map[department] += uses;
  });
  return Object.entries(map).sort((a,b) => b[1] - a[1]);
}

function renderTopCodes(codes){
  const wrap = document.getElementById("topCodesList");
  wrap.innerHTML = "";
  if(!codes.length){
    wrap.innerHTML = `<div class="empty">No code data yet.</div>`;
    return;
  }
  codes.forEach(item => {
    wrap.innerHTML += `
      <div class="list-row">
        <span><strong>${item.code}</strong> — ${item.department || ""}</span>
        <span>${item.uses || 0}</span>
      </div>
    `;
  });
}

function renderTopDepartments(codes){
  const wrap = document.getElementById("topDepartmentsList");
  wrap.innerHTML = "";
  const departments = buildDepartmentTotals(codes);
  if(!departments.length){
    wrap.innerHTML = `<div class="empty">No department data yet.</div>`;
    return;
  }
  departments.forEach(dep => {
    wrap.innerHTML += `
      <div class="list-row">
        <span>${dep[0]}</span>
        <span>${dep[1]}</span>
      </div>
    `;
  });
}

async function loadMonitor(){
  const activity = await fetchActivity();
  const codes = await fetchCodes();
  renderSummary(activity);
  renderOperatorFeed(activity);
  renderManagerTable(activity);
  renderTopCodes(codes);
  renderTopDepartments(codes);
}

loadMonitor();

client.channel("washtrac-live-monitor")
.on("postgres_changes", { event: "*", schema: "public", table: "activity" }, () => loadMonitor())
.on("postgres_changes", { event: "*", schema: "public", table: "codes" }, () => loadMonitor())
.subscribe();
</script>
</body>
</html>
