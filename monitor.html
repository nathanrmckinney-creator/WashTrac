<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WashTrac Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Arial, Helvetica, sans-serif;background:#020617;color:white;overflow-x:hidden;}
.app{display:flex;min-height:100vh;}
.sidebar{width:220px;background:#0f172a;padding:20px;flex-shrink:0;border-right:1px solid #1e293b;}

.logo,.mobile-logo{
  font-family:'Orbitron', Arial, sans-serif;
  font-size:22px;
  font-weight:900;
  letter-spacing:.5px;
  margin-bottom:32px;
}

.logo .trac,.mobile-logo .trac{
  background:linear-gradient(180deg,#ffffff 0%,#66c7ff 40%,#1e9bff 72%,#0b5cff 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  -webkit-text-fill-color:transparent;
}

.nav a{display:block;color:#cbd5f5;text-decoration:none;padding:10px 0;}
.nav a:hover{color:white;}

.main{flex:1;padding:30px;position:relative;}

.desktop-menu-wrap{position:absolute;top:24px;right:30px;z-index:1000;}
.menu-btn{background:#2563eb;border:none;color:white;padding:10px 14px;border-radius:8px;cursor:pointer;font-weight:bold;}

.hamburger-menu{
  display:none;
  position:absolute;
  top:46px;
  right:0;
  width:220px;
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:12px;
  padding:12px 16px;
  box-shadow:0 12px 30px rgba(0,0,0,.45);
  z-index:1100;
}

.hamburger-menu a{display:block;color:#cbd5f5;text-decoration:none;padding:10px 0;}
.hamburger-menu a:hover{color:white;}
.hamburger-menu a.logout-link{color:#f87171;}

.mobile-topbar{display:none;align-items:center;justify-content:space-between;padding:16px 20px;background:#0f172a;border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:1000;}
.mobile-logo{margin-bottom:0;}

.mobile-menu{display:none;position:absolute;top:64px;right:16px;width:240px;background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:12px 16px;box-shadow:0 12px 30px rgba(0,0,0,.45);z-index:1100;}
.mobile-menu a{display:block;color:#cbd5f5;text-decoration:none;padding:10px 0;}
.mobile-menu a:hover{color:white;}
.mobile-menu a.logout-link{color:#f87171;}

.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1050;}

.page-header{margin-bottom:24px;padding-right:80px;}
.page-header h1{margin:0 0 10px 0;font-size:42px;}
.page-header p{margin:0;color:#94a3b8;line-height:1.5;}

.banner{
  width:100%;
  padding:20px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  border-radius:10px;
  margin-bottom:20px;
}

.green{background:#14532d;color:#86efac;}
.red{background:#7f1d1d;color:#fecaca;}
.yellow{background:#78350f;color:#fde68a;}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr;
  gap:20px;
  margin-bottom:20px;
}

.bay-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr;
  gap:20px;
  margin-bottom:20px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  border:1px solid #1f2937;
}

.card h3{
  margin-top:0;
  margin-bottom:14px;
}

.card-span-full{
  grid-column:1 / -1;
}

.bay-card{
  background:#0b1220;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:18px;
  text-align:center;
}

.bay-card h3{
  margin:0 0 10px 0;
  font-size:20px;
}

.bay-dot{
  width:18px;
  height:18px;
  border-radius:50%;
  display:inline-block;
  margin-right:8px;
  vertical-align:middle;
}

.dot-ready{background:#22c55e;box-shadow:0 0 12px rgba(34,197,94,.45);}
.dot-running{background:#38bdf8;box-shadow:0 0 12px rgba(56,189,248,.45);}
.dot-idle{background:#f59e0b;box-shadow:0 0 12px rgba(245,158,11,.35);}
.dot-offline{background:#ef4444;box-shadow:0 0 12px rgba(239,68,68,.35);}

.bay-status{
  font-size:18px;
  font-weight:bold;
}

.status-pill{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  font-weight:bold;
}

.on{background:#14532d;color:#86efac;}
.off{background:#7f1d1d;color:#fca5a5;}
.warn{background:#78350f;color:#fcd34d;}

.activity-row{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #1f2937;
  padding:10px 0;
  gap:14px;
}

.activity-row:last-child{
  border-bottom:none;
}

.activity-time,
.activity-code,
.activity-event{
  flex:1;
}

.activity-code{
  text-align:center;
}

.activity-event{
  text-align:right;
}

.empty-state{
  color:#94a3b8;
  padding:6px 0;
}

@media (max-width:1100px){
  .grid,.bay-grid{grid-template-columns:1fr 1fr;}
}

@media (max-width:900px){
  .app{display:block;}
  .sidebar{display:none;}
  .desktop-menu-wrap{display:none;}
  .mobile-topbar{display:flex;}
  .main{padding:20px;}
  .page-header{padding-right:0;}
  .page-header h1{font-size:34px;}
  .grid,.bay-grid{grid-template-columns:1fr;}
  .activity-row{flex-direction:column;gap:6px;}
  .activity-code,.activity-event{text-align:left;}
}
</style>
</head>

<body>
<script>
if(localStorage.getItem("washtracLoggedIn") !== "yes"){
  window.location.href = "login.html";
}
</script>

<div class="mobile-topbar">
  <div class="mobile-logo">Wash<span class="trac">Trac</span></div>
  <button class="menu-btn" onclick="toggleMobileMenu()">☰</button>
</div>

<div class="mobile-menu" id="mobileMenu">
  <a href="index.html" onclick="closeMenus()">Back to Homepage</a>
  <a href="#" class="logout-link" onclick="logout()">Logout</a>
</div>

<div class="backdrop" id="backdrop" onclick="closeMenus()"></div>

<div class="app">
  <div class="sidebar">
    <div class="logo">Wash<span class="trac">Trac</span></div>

    <div class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="codes.html">Codes</a>
      <a href="activity.html">Activity</a>
      <a href="usage.html">Reports</a>
      <a href="monitor.html">Monitor</a>
    </div>
  </div>

  <div class="main">
    <div class="desktop-menu-wrap">
      <button class="menu-btn" onclick="toggleDesktopMenu()">☰</button>

      <div class="hamburger-menu" id="desktopMenu">
        <a href="index.html" onclick="closeMenus()">Back to Homepage</a>
        <a href="#" class="logout-link" onclick="logout()">Logout</a>
      </div>
    </div>

    <div class="page-header">
      <h1>System Monitor</h1>
      <p>Live system status, E-STOP state, lockout window, bay status, and recent wash activity.</p>
    </div>

    <div id="systemBanner" class="banner green">SYSTEM ONLINE</div>

    <div class="bay-grid" id="bayGrid"></div>

    <div class="grid">
      <div class="card">
        <h3>Wash Status</h3>
        <div id="washStatus"></div>
      </div>

      <div class="card">
        <h3>E-STOP</h3>
        <div id="estopStatus"></div>
      </div>

      <div class="card">
        <h3>Scheduled Lockout</h3>
        <div id="lockoutStatus"></div>
      </div>

      <div class="card">
        <h3>Lockout Window</h3>
        <div id="lockoutWindow"></div>
      </div>

      <div class="card card-span-full">
        <h3>Recent Activity</h3>
        <div id="activity"></div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://feqrsypiugwwdweiwvua.supabase.co";
const SUPABASE_KEY = "sb_publishable_wWkZTvf6dLAlreLlLAOcXA_7jG3D8GS";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function toggleDesktopMenu(){
  const menu = document.getElementById("desktopMenu");
  const backdrop = document.getElementById("backdrop");
  const isOpen = menu.style.display === "block";

  menu.style.display = isOpen ? "none" : "block";
  backdrop.style.display = isOpen ? "none" : "block";
}

function toggleMobileMenu(){
  const menu = document.getElementById("mobileMenu");
  const backdrop = document.getElementById("backdrop");
  const isOpen = menu.style.display === "block";

  menu.style.display = isOpen ? "none" : "block";
  backdrop.style.display = isOpen ? "none" : "block";
}

function closeMenus(){
  document.getElementById("mobileMenu").style.display = "none";
  document.getElementById("desktopMenu").style.display = "none";
  document.getElementById("backdrop").style.display = "none";
}

function logout(){
  localStorage.removeItem("washtracLoggedIn");
  window.location.href = "login.html";
}

function checkLockout(control){
  if(!control || !control.lockout_enabled) return false;
  if(!control.lockout_start || !control.lockout_end) return false;

  const now = new Date();
  const nowMinutes = now.getHours() * 60 + now.getMinutes();

  const start = String(control.lockout_start).split(":");
  const end = String(control.lockout_end).split(":");

  const startMin = parseInt(start[0], 10) * 60 + parseInt(start[1], 10);
  const endMin = parseInt(end[0], 10) * 60 + parseInt(end[1], 10);

  if(startMin <= endMin){
    return nowMinutes >= startMin && nowMinutes <= endMin;
  } else {
    return nowMinutes >= startMin || nowMinutes <= endMin;
  }
}

function getBayDotClass(status){
  const value = String(status || "").toLowerCase();
  if(value === "ready") return "dot-ready";
  if(value === "running") return "dot-running";
  if(value === "offline") return "dot-offline";
  return "dot-idle";
}

function renderBays(bays){
  const wrap = document.getElementById("bayGrid");
  wrap.innerHTML = "";

  if(!bays || !bays.length){
    wrap.innerHTML = `
      <div class="bay-card">
        <h3>No Bays Found</h3>
        <div class="bay-status">Add rows in bay_status</div>
      </div>
    `;
    return;
  }

  bays.forEach(bay => {
    wrap.innerHTML += `
      <div class="bay-card">
        <h3>${bay.bay_name || bay.bay || "Bay"}</h3>
        <div class="bay-status">
          <span class="bay-dot ${getBayDotClass(bay.status)}"></span>
          ${bay.status || "Idle"}
        </div>
      </div>
    `;
  });
}

function getActivityCode(row){
  return (
    row.metadata?.code ||
    row.code ||
    row.access_code ||
    ""
  );
}

function getActivityEvent(row){
  return (
    row.event ||
    row.status ||
    ""
  );
}

function getActivityTime(row){
  return (
    row.event_time ||
    row.created_at ||
    row.timestamp ||
    ""
  );
}

function renderActivity(activity){
  const wrap = document.getElementById("activity");
  wrap.innerHTML = "";

  if(!activity || !activity.length){
    wrap.innerHTML = `<div class="empty-state">No recent activity found.</div>`;
    return;
  }

  activity.forEach(row => {
    const rawTime = getActivityTime(row);
    const timeText = rawTime
      ? new Date(rawTime).toLocaleTimeString()
      : "--:--";

    wrap.innerHTML += `
      <div class="activity-row">
        <div class="activity-time">${timeText}</div>
        <div class="activity-code">${getActivityCode(row)}</div>
        <div class="activity-event">${getActivityEvent(row)}</div>
      </div>
    `;
  });
}

function renderControl(control){
  const banner = document.getElementById("systemBanner");

  if(!control){
    document.getElementById("washStatus").innerHTML = '<span class="status-pill off">Unknown</span>';
    document.getElementById("estopStatus").innerHTML = '<span class="status-pill off">Unknown</span>';
    document.getElementById("lockoutStatus").innerHTML = '<span class="status-pill off">Unknown</span>';
    document.getElementById("lockoutWindow").innerText = "--:-- to --:--";

    banner.className = "banner yellow";
    banner.innerText = "SYSTEM STATUS UNKNOWN";
    return;
  }

  const washEnabled = control.wash_enabled !== false;
  const estopActive = control.estop_active === true;
  const lockoutEnabled = control.lockout_enabled === true;

  document.getElementById("washStatus").innerHTML =
    washEnabled
      ? '<span class="status-pill on">Enabled</span>'
      : '<span class="status-pill off">Disabled</span>';

  document.getElementById("estopStatus").innerHTML =
    estopActive
      ? '<span class="status-pill warn">ACTIVE</span>'
      : '<span class="status-pill on">Clear</span>';

  document.getElementById("lockoutStatus").innerHTML =
    lockoutEnabled
      ? '<span class="status-pill warn">Enabled</span>'
      : '<span class="status-pill off">Disabled</span>';

  document.getElementById("lockoutWindow").innerText =
    (control.lockout_start || "--:--") + " to " + (control.lockout_end || "--:--");

  if(estopActive){
    banner.className = "banner red";
    banner.innerText = "🚨 EMERGENCY STOP ACTIVE";
  } else if(!washEnabled){
    banner.className = "banner red";
    banner.innerText = "WASH SYSTEM DISABLED";
  } else if(checkLockout(control)){
    banner.className = "banner yellow";
    banner.innerText = "AFTER HOURS LOCKOUT ACTIVE";
  } else {
    banner.className = "banner green";
    banner.innerText = "SYSTEM ONLINE";
  }
}

async function loadControl(){
  const { data, error } = await client
    .from("system_control")
    .select("*")
    .limit(1)
    .maybeSingle();

  if(error){
    console.log("system_control error:", error);
    renderControl(null);
    return;
  }

  renderControl(data || null);
}

async function loadBays(){
  const { data, error } = await client
    .from("bay_status")
    .select("*")
    .order("bay_name", { ascending:true });

  if(error){
    console.log("bay_status error:", error);
    renderBays([]);
    return;
  }

  renderBays(data || []);
}

async function loadActivity(){
  const { data, error } = await client
    .from("wash_activity")
    .select("*")
    .order("event_time", { ascending:false })
    .limit(10);

  if(error){
    console.log("wash_activity error:", error);
    renderActivity([]);
    return;
  }

  renderActivity(data || []);
}

async function loadMonitor(){
  await Promise.all([
    loadControl(),
    loadBays(),
    loadActivity()
  ]);
}

loadMonitor();

client.channel("monitor-live")
  .on("postgres_changes", { event:"*", schema:"public", table:"wash_activity" }, () => loadActivity())
  .on("postgres_changes", { event:"*", schema:"public", table:"system_control" }, () => loadControl())
  .on("postgres_changes", { event:"*", schema:"public", table:"bay_status" }, () => loadBays())
  .subscribe((status) => {
    console.log("Monitor realtime:", status);
  });

setInterval(loadMonitor, 30000);
</script>
</body>
</html>
