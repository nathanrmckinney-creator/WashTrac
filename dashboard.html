<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>WashTrac Dashboard</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.sidebar{
position:fixed;
left:0;
top:0;
bottom:0;
width:220px;
background:#0f172a;
padding:20px;
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:40px;
}

.nav a{
display:block;
color:#cbd5f5;
text-decoration:none;
padding:10px 0;
}

.nav a:hover{
color:white;
}

.main{
margin-left:220px;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#111827;
padding:20px;
border-radius:6px;
}

.card h3{
margin:0 0 10px 0;
}

.big{
font-size:32px;
}

.activity{
background:#111827;
padding:20px;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td{
padding:8px;
border-bottom:1px solid #1f2937;
}

</style></head><body><div class="sidebar"><div class="logo">WashTrac</div><div class="nav"><a href="dashboard.html">Dashboard</a>
<a href="codes.html">Codes</a>
<a href="#">Activity</a>
<a href="#">Reports</a>
<a href="#">Locations</a>
<a href="#">Devices</a>
<a href="#">Account</a>

</div></div><div class="main"><h1>Dashboard</h1><div class="cards"><div class="card">
<h3>Today's Washes</h3>
<div class="big" id="todayWashes">0</div>
</div><div class="card">
<h3>Active Codes</h3>
<div class="big" id="activeCodes">0</div>
</div><div class="card">
<h3>Online Devices</h3>
<div class="big">0</div>
</div></div><div class="activity"><h3>Recent Activity</h3><table id="activityTable">
<tbody></tbody>
</table></div></div><script>

const SUPABASE_URL = "https://feqrsypiugwwdweiwvua.supabase.co"
const SUPABASE_KEY = "sb_publishable_wWkZTvf6dLAlreLlLAOcXA_7jG3D8GS"

const client = supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

async function loadDashboard(){

const {data:codes} = await client
.from("codes")
.select("*")

document.getElementById("activeCodes").innerText=codes.length

const {data:activity} = await client
.from("activity")
.select("*")
.order("event_time",{ascending:false})
.limit(10)

document.getElementById("todayWashes").innerText=activity.length

const tbody=document.querySelector("#activityTable tbody")

tbody.innerHTML=""

activity.forEach(row=>{

tbody.innerHTML+=`

<tr>
<td>${new Date(row.event_time).toLocaleTimeString()}</td>
<td>${row.code}</td>
<td>${row.bay || ""}</td>
</tr>

`

})

}

loadDashboard()

</script></body>
</html>
