<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WashTrac Reports</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.app{
display:flex;
min-height:100vh;
}

.sidebar{
width:220px;
background:#0f172a;
padding:20px;
border-right:1px solid #1e293b;
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:32px;
}

.nav a{
display:block;
color:#cbd5f5;
text-decoration:none;
padding:10px 0;
}

.nav a:hover{color:white;}

.main{
flex:1;
padding:30px;
}

.mobile-topbar{
display:none;
align-items:center;
justify-content:space-between;
padding:16px 20px;
background:#0f172a;
border-bottom:1px solid #1e293b;
}

.mobile-logo{font-size:22px;font-weight:bold;}

.menu-btn{
background:#2563eb;
border:none;
color:white;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
}

.mobile-menu{
display:none;
position:absolute;
top:64px;
right:16px;
width:220px;
background:#0f172a;
border-radius:10px;
padding:14px;
}

.mobile-menu a{
display:block;
color:#cbd5f5;
text-decoration:none;
padding:10px 0;
}

.mobile-menu a:hover{color:white;}

.page-header h1{
margin:0 0 10px 0;
font-size:40px;
}

.page-header p{
margin:0;
color:#94a3b8;
}

.summary{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
margin:20px 0;
}

.summary-box{
background:#111827;
padding:18px;
border-radius:10px;
}

.summary-box strong{
font-size:28px;
display:block;
margin-bottom:6px;
}

.card{
background:#111827;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.bar-row{margin-bottom:16px;}

.bar-label{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

.bar{
height:16px;
background:#1f2937;
border-radius:999px;
overflow:hidden;
}

.bar-fill{
height:100%;
background:linear-gradient(90deg,#2563eb,#60a5fa);
}

.list-row{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #1f2937;
}

button{
padding:12px 16px;
background:#2563eb;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
margin-right:10px;
}

button.secondary{background:#334155;}

@media(max-width:900px){

.sidebar{display:none;}

.mobile-topbar{display:flex;}

.app{display:block;}

.summary{grid-template-columns:1fr;}

}
</style>
</head>

<body>

<div class="mobile-topbar">
<div class="mobile-logo">WashTrac</div>
<button class="menu-btn" onclick="toggleMenu()">Menu</button>
</div>

<div class="mobile-menu" id="mobileMenu">
<a href="dashboard.html">Dashboard</a>
<a href="codes.html">Codes</a>
<a href="activity.html">Activity</a>
<a href="usage.html">Reports</a>
</div>

<div class="app">

<div class="sidebar">

<div class="logo">WashTrac</div>

<div class="nav">
<a href="dashboard.html">Dashboard</a>
<a href="codes.html">Codes</a>
<a href="activity.html">Activity</a>
<a href="usage.html">Reports</a>
</div>

</div>

<div class="main">

<div class="page-header">
<h1>Reports</h1>
<p>Usage analytics and reporting.</p>
</div>

<div class="summary">

<div class="summary-box">
<strong id="totalUses">0</strong>
<span>Total Uses</span>
</div>

<div class="summary-box">
<strong id="totalCodes">0</strong>
<span>Total Codes</span>
</div>

<div class="summary-box">
<strong id="topCode">-</strong>
<span>Top Code</span>
</div>

<div class="summary-box">
<strong id="topDept">-</strong>
<span>Top Department</span>
</div>

</div>

<div class="card">

<h3>Department Usage</h3>

<div id="departmentBars"></div>

</div>

<div class="card">

<h3>Top Used Codes</h3>

<div id="topCodes"></div>

</div>

<div class="card">

<h3>Report Actions</h3>

<button onclick="exportCSV()">Export CSV</button>
<button class="secondary" onclick="emailReport()">Email Report</button>

</div>

</div>
</div>

<script>

const SUPABASE_URL="https://feqrsypiugwwdweiwvua.supabase.co"
const SUPABASE_KEY="sb_publishable_wWkZTvf6dLAlreLlLAOcXA_7jG3D8GS"

const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

function toggleMenu(){
const m=document.getElementById("mobileMenu")
m.style.display=m.style.display==="block"?"none":"block"
}

async function loadUsage(){

const {data:codes}=await client
.from("codes")
.select("*")
.order("uses",{ascending:false})

if(!codes)return

document.getElementById("totalCodes").innerText=codes.length

let totalUses=0
codes.forEach(c=>totalUses+=Number(c.uses||0))
document.getElementById("totalUses").innerText=totalUses

if(codes.length){
document.getElementById("topCode").innerText=codes[0].code
}

const dept={}

codes.forEach(c=>{
const d=c.department||"Unassigned"
dept[d]=(dept[d]||0)+Number(c.uses||0)
})

const sorted=Object.entries(dept).sort((a,b)=>b[1]-a[1])

if(sorted.length){
document.getElementById("topDept").innerText=sorted[0][0]
}

const barWrap=document.getElementById("departmentBars")
barWrap.innerHTML=""

const max=Math.max(...sorted.map(d=>d[1]),1)

sorted.forEach(d=>{
const percent=(d[1]/max)*100
barWrap.innerHTML+=`
<div class="bar-row">
<div class="bar-label">
<span>${d[0]}</span>
<span>${d[1]}</span>
</div>
<div class="bar">
<div class="bar-fill" style="width:${percent}%"></div>
</div>
</div>
`
})

const list=document.getElementById("topCodes")
list.innerHTML=""

codes.slice(0,10).forEach(c=>{
list.innerHTML+=`
<div class="list-row">
<span>${c.code}</span>
<span>${c.uses||0}</span>
</div>
`
})

}

function exportCSV(){
alert("CSV export coming next step")
}

function emailReport(){
alert("Email report coming next step")
}

loadUsage()

</script>

</body>
</html>
