<!DOCTYPE html>
<html>
<head>
  <title>WashTrac Sign Up</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #000814 0%, #06142d 100%);
      color: white;
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 10px;
    }

    .page {
      width: 450px;
      text-align: center;
    }

    /* 🔥 UPDATED LOGO (matches your system) */
    .logo{
      font-family:'Orbitron', Arial, sans-serif;
      font-size:30px;
      font-weight:900;
      letter-spacing:.5px;
      margin-bottom:10px;
      text-align:center;
    }

    .logo .trac{
      background:linear-gradient(
        180deg,
        #ffffff 0%,
        #66c7ff 40%,
        #1e9bff 72%,
        #0b5cff 100%
      );
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      -webkit-text-fill-color:transparent;
    }

    .tagline {
      color: #9fb3c8;
      font-size: 13px;
      letter-spacing: 1.3px;
      margin-top: -10px;
      margin-bottom: 10px;
    }

    .card {
      background: rgba(15, 25, 42, 0.95);
      border: 1px solid rgba(159, 179, 200, 0.14);
      border-radius: 16px;
      padding: 28px 30px 32px;
      text-align: left;
      box-shadow: 0 0 35px rgba(0,0,0,0.25);
    }

    h2 {
      margin: 0 0 24px;
      font-size: 30px;
      line-height: 1;
      font-weight: 800;
      color: #ffffff;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      height: 52px;
      border-radius: 10px;
      border: 1px solid rgba(159, 179, 200, 0.28);
      background: #071226;
      color: white;
      font-size: 16px;
      padding: 0 14px;
      outline: none;
    }

    input::placeholder {
      color: #7f93b0;
    }

    input:focus {
      border-color: #1ea7ff;
      box-shadow: 0 0 0 2px rgba(30,167,255,0.12);
    }

    .login-btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 10px;
      background: #3167e8;
      color: white;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 2px;
    }

    .login-btn:hover {
      opacity: 0.95;
    }

    .home-btn {
      width: 100%;
      height: 50px;
      border: none;
      border-radius: 10px;
      background: #3b4b63;
      color: white;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 16px;
    }

    .link {
      text-align: center;
      margin-top: 18px;
      color: #9fb3c8;
      font-size: 16px;
    }

    .link a {
      color: #1ea7ff;
      text-decoration: none;
      margin-left: 4px;
    }

    .status {
      text-align: center;
      margin-top: 15px;
      min-height: 20px;
      font-size: 14px;
      color: #9fb3c8;
    }

    .error {
      color: #ef4444;
    }

    .success {
      color: #22c55e;
    }
  </style>
</head>

<body>

  <div class="page">

    <!-- 🔥 UPDATED LOGO -->
    <div class="logo">Wash<span class="trac">Trac</span></div>

    <div class="tagline">Control. Track. Manage.</div>

    <div class="card">
      <h2>Create Account</h2>

      <form onsubmit="signup(event)">
        <div class="field">
          <label>Email</label>
          <input id="email" type="email" placeholder="Enter email" required>
        </div>

        <div class="field">
          <label>Password</label>
          <input id="password" type="password" placeholder="Enter password" required>
        </div>

        <div class="field">
          <label>Company Name</label>
          <input id="orgName" type="text" placeholder="Enter company name" required>
        </div>

        <div class="field">
          <label>Site Name</label>
          <input id="siteName" type="text" placeholder="Example: Main Wash" required>
        </div>

        <button id="signupBtn" type="submit" class="login-btn">Create Account</button>
      </form>

      <div class="link">
        Already have an account? <a href="login.html">Login</a>
      </div>

      <button class="home-btn" onclick="window.location.href='index.html'">Back to Homepage</button>

      <div class="status" id="statusBox"></div>
    </div>
  </div>

<script>
const SUPABASE_URL = "https://feqrsypiugwwdweiwvua.supabase.co";
const SUPABASE_KEY = "sb_publishable_wWkZTvf6dLAlreLlLAOcXA_7jG3D8GS";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function signup(event) {
  event.preventDefault();

  const btn = document.getElementById("signupBtn");
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const orgName = document.getElementById("orgName").value.trim();
  const siteName = document.getElementById("siteName").value.trim();
  const statusBox = document.getElementById("statusBox");

  btn.disabled = true;
  btn.innerText = "Creating...";

  statusBox.className = "status";
  statusBox.innerText = "Creating account...";

  try {
    if (!email || !password || !orgName || !siteName) {
      statusBox.className = "status error";
      statusBox.innerText = "Please fill out all fields.";
      return;
    }

    localStorage.setItem("pendingOrgName", orgName);
    localStorage.setItem("pendingSiteName", siteName);

    const { error } = await client.auth.signUp({
      email: email,
      password: password
    });

    if (error) {
      statusBox.className = "status error";
      statusBox.innerText = error.message;
      return;
    }

    statusBox.className = "status success";
    statusBox.innerText = "Account created. Check your email, confirm it, then login.";

  } finally {
    btn.disabled = false;
    btn.innerText = "Create Account";
  }
}
</script>

</body>
</html>
